---
- name: Agentic XML validate module smoke test
  hosts: ci
  gather_facts: false
  vars:
    agentic_xml_template: "{{ playbook_dir }}/../../roles/xml_validation/templates/service_config.xml.j2"
    mock_llm_url: "http://127.0.0.1:8765/v1/chat/completions"
    agentic_xml_template_vars:
      xml_validation_environment: ci
      xml_validation_service_name: agentic-xml-smoke
      xml_validation_owner: network-automation
      xml_validation_change_ticket: CHG-2026-0001
      xml_validation_protocol: https
      xml_validation_host: example.internal
      xml_validation_port: 8443
      xml_validation_tls_enabled: "true"
      xml_validation_certificate_profile: internal-mtls
      xml_validation_backend_pool:
        - name: primary-api
          host: api-1.example.internal
          port: 9443
          weight: 100
        - name: standby-api
          host: api-2.example.internal
          port: 9443
          weight: 50
      xml_validation_routes:
        - name: health-check
          priority: 10
          method: GET
          path: /healthz
          backend: primary-api
        - name: order-writes
          priority: 20
          method: POST
          path: /v1/orders
          backend: primary-api
      xml_validation_features:
        - xml-render
        - llm-review
        - inventory-context
        - backend-routing
      xml_validation_allowed_status_codes:
        - 200
        - 201
        - 204
      xml_validation_max_payload_kb: 512
      xml_validation_logging_profile: structured-json
      xml_validation_metrics_enabled: "true"
  tasks:
    - name: Resolve LLM execution mode
      ansible.builtin.set_fact:
        llm_api_key: "{{ lookup('ansible.builtin.env', 'LLM_API_KEY') | default('', true) | trim }}"
        llm_api_url: "{{ lookup('ansible.builtin.env', 'LLM_API_URL') | default('', true) | trim }}"
        llm_model: "{{ lookup('ansible.builtin.env', 'LLM_MODEL') | default('gpt-4o-mini', true) | trim }}"

    - name: Build provider runtime values
      ansible.builtin.set_fact:
        use_real_llm: "{{ llm_api_key | length > 0 }}"
        llm_provider_url: >-
          {{
            llm_api_url
            if (llm_api_key | length > 0)
            else (lookup('ansible.builtin.env', 'MOCK_LLM_PROVIDER_URL') | default(mock_llm_url, true) | trim)
          }}
        agentic_xml_report_path: >-
          {{
            lookup('ansible.builtin.env', 'AGENTIC_XML_VALIDATION_REPORT')
            | default(playbook_dir + '/../../agentic-xml-validation-report.md', true)
          }}

    - name: Show selected LLM mode
      ansible.builtin.debug:
        msg:
          use_real_llm: "{{ use_real_llm }}"
          provider_url_supplied: "{{ llm_provider_url | length > 0 }}"
          provider_url: "{{ llm_provider_url if (not use_real_llm) else (llm_provider_url | default('module default provider', true)) }}"
          model: "{{ llm_model if use_real_llm else 'mock-xml-validator' }}"

    - name: Validate service XML template with selected LLM provider
      agentic_xml_validate:
        src: "{{ agentic_xml_template }}"
        template_vars: "{{ agentic_xml_template_vars }}"
        api_key: "{{ llm_api_key if use_real_llm else 'ci-test-key' }}"
        provider_url: "{{ llm_provider_url | default(omit, true) }}"
        model: "{{ llm_model if use_real_llm else 'mock-xml-validator' }}"
        playbook_path: "{{ playbook_dir }}/agentic_module_smoke.yml"
        role_path: "{{ playbook_dir }}/../../roles/xml_validation"
        inventory_path: "{{ playbook_dir }}/../../inventory/ci/hosts.yml"
        group_vars_path: "{{ playbook_dir }}/../../inventory/ci/group_vars"
        host_vars_path: "{{ playbook_dir }}/../../inventory/ci/host_vars"
        extra_context:
          source: github-actions-smoke-test
          expected_service: agentic-xml-smoke
        fail_on_invalid: false
        return_rendered: true
      register: agentic_xml_validation_result

    - name: Write agentic XML validation report
      ansible.builtin.copy:
        dest: "{{ agentic_xml_report_path }}"
        mode: "0644"
        content: |
          # Agentic XML Validation Report

          ## Run Summary

          | Field | Value |
          | --- | --- |
          | Overall result | {{ 'PASSED' if agentic_xml_validation_result.valid else 'FAILED' }} |
          | Local XML parse | {{ 'PASSED' if agentic_xml_validation_result.local_xml_valid else 'FAILED' }} |
          | LLM mode | {{ 'Real provider' if use_real_llm else 'Mock provider' }} |
          | Provider profile | {{ lookup('ansible.builtin.env', 'LLM_PROVIDER_PROFILE') | default('local/mock', true) }} |
          | Model | {{ llm_model if use_real_llm else 'mock-xml-validator' }} |
          | Template | `{{ agentic_xml_template }}` |

          ## Developer Fix Guidance

          {% if not agentic_xml_validation_result.local_xml_valid %}
          **XML parse error:** {{ agentic_xml_validation_result.local_xml_error }}

          {% if agentic_xml_validation_result.local_xml_error_line %}
          Broken rendered XML location: line {{ agentic_xml_validation_result.local_xml_error_line }}, column {{ agentic_xml_validation_result.local_xml_error_column }}.
          {% endif %}
          {% endif %}

          {% if agentic_xml_validation_result.template_variable_findings | length > 0 %}
          ### Missing Template Variables

          | Variable | Template line | Current behavior | Suggested fix |
          | --- | --- | --- | --- |
          {% for finding in agentic_xml_validation_result.template_variable_findings %}
          | `{{ finding.variable }}` | `{{ finding.template_path }}:{{ finding.template_line }}` | Uses template default `{{ finding.default_value | default('none', true) }}` | {{ finding.suggested_fix | replace('|', '\\|') }} |
          {% endfor %}
          {% endif %}

          ## AI Feedback

          {{ agentic_xml_validation_result.feedback | default('No feedback returned.', true) }}

          ## AI Suggested Fix

          ```text
          {{ agentic_xml_validation_result.suggested_fix | default('No suggested fix returned.', true) }}
          ```

          ## Issues

          {% if agentic_xml_validation_result.issues | length > 0 %}
          | Severity | Location | Message | Suggested fix |
          | --- | --- | --- | --- |
          {% for issue in agentic_xml_validation_result.issues %}
          | {{ issue.severity | default('info') | string | replace('|', '\\|') }} | {{ issue.location | default('n/a') | string | replace('|', '\\|') }} | {{ issue.message | default('') | string | replace('|', '\\|') }} | {{ issue.suggested_fix | default('') | string | replace('|', '\\|') }} |
          {% endfor %}
          {% else %}
          No issues reported.
          {% endif %}

          ## Context Files Used

          {% if agentic_xml_validation_result.context_files_used | length > 0 %}
          {% for context_file in agentic_xml_validation_result.context_files_used %}
          - `{{ context_file }}`
          {% endfor %}
          {% else %}
          No context files were supplied.
          {% endif %}

          ## Rendered XML

          {% if agentic_xml_validation_result.rendered_xml_diagnostic is defined %}
          {{ agentic_xml_validation_result.rendered_xml_diagnostic.markdown }}
          {% else %}
          ```xml
          {{ agentic_xml_validation_result.rendered_xml | default('Rendered XML was not returned.', true) }}
          ```
          {% endif %}
      delegate_to: localhost

    - name: Show XML validation summary
      ansible.builtin.debug:
        msg:
          valid: "{{ agentic_xml_validation_result.valid }}"
          local_xml_valid: "{{ agentic_xml_validation_result.local_xml_valid }}"
          feedback: "{{ agentic_xml_validation_result.feedback }}"
          issues: "{{ agentic_xml_validation_result.issues }}"
          template_variable_findings: "{{ agentic_xml_validation_result.template_variable_findings }}"
          context_files_used: "{{ agentic_xml_validation_result.context_files_used }}"
          rendered_xml: "{{ agentic_xml_validation_result.rendered_xml }}"

    - name: Assert agentic validation baseline
      ansible.builtin.assert:
        that:
          - agentic_xml_validation_result.local_xml_valid
          - agentic_xml_validation_result.valid
          - not agentic_xml_validation_result.changed
          - "'agentic-xml-smoke' in agentic_xml_validation_result.rendered_xml"
          - "'<serviceConfiguration environment=\"ci\" version=\"1.0\">' in agentic_xml_validation_result.rendered_xml"
          - "'primary-api' in agentic_xml_validation_result.rendered_xml"
          - "'/v1/orders' in agentic_xml_validation_result.rendered_xml"
          - agentic_xml_validation_result.context_files_used | length > 0

    - name: Assert mock-mode result is deterministic
      ansible.builtin.assert:
        that:
          - agentic_xml_validation_result.valid
      when: not use_real_llm

    - name: Assert real-provider response contract
      ansible.builtin.assert:
        that:
          - agentic_xml_validation_result.feedback is string
          - agentic_xml_validation_result.issues is iterable
      when: use_real_llm

    - name: Validate AI contract catches a service-context mismatch
      agentic_xml_validate:
        src: "{{ agentic_xml_template }}"
        template_vars: "{{ agentic_xml_template_vars }}"
        api_key: ci-test-key
        provider_url: "{{ lookup('ansible.builtin.env', 'MOCK_LLM_PROVIDER_URL') | default(mock_llm_url, true) }}"
        model: mock-xml-validator
        playbook_path: "{{ playbook_dir }}/agentic_module_smoke.yml"
        role_path: "{{ playbook_dir }}/../../roles/xml_validation"
        inventory_path: "{{ playbook_dir }}/../../inventory/ci/hosts.yml"
        group_vars_path: "{{ playbook_dir }}/../../inventory/ci/group_vars"
        host_vars_path: "{{ playbook_dir }}/../../inventory/ci/host_vars"
        extra_context:
          source: github-actions-negative-smoke-test
          expected_service: unexpected-service
        fail_on_invalid: false
        return_rendered: true
      register: agentic_xml_mismatch_result
      when: not use_real_llm

    - name: Assert AI contract mismatch is reported without XML parse failure
      ansible.builtin.assert:
        that:
          - not agentic_xml_mismatch_result.valid
          - agentic_xml_mismatch_result.local_xml_valid
          - not agentic_xml_mismatch_result.changed
          - "'Expected service unexpected-service but rendered agentic-xml-smoke.' in (agentic_xml_mismatch_result.issues | to_json)"
      when: not use_real_llm
